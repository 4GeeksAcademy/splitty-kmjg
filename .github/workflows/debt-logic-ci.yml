name: Debt Logic Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  debt-logic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests (Debt logic + API)
        env:
          TESTING: '1'
        run: |
          # Run debt logic tests and API tests in a single matrix to ensure end-to-end stability
          python -m pytest -q \
            src/api/test_algorithm.py \
            src/api/test_group_invitations.py \
            src/api/test_friends.py \
            src/tests/test_debt_logic.py \
            src/tests/test_expense_group_logic.py
