name: Debt Logic Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  debt-logic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run debt/algorithm tests (SQLite harness)
        env:
          TESTING: '1'
        run: |
          pytest -q src/api/test_algorithm.py src/tests/test_debt_logic.py
